<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrowserPod Recipes</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <select id="recipe-select" aria-label="Recipe"></select>
        <button id="run-button" type="button">Run</button>
        <span id="status"></span>
      </div>
      <div id="url"></div>
      <form id="cmd-form" hidden autocomplete="off">
        <span id="cmd-cwd">/project</span><span id="cmd-sep"> $ </span><input id="cmd-input" type="text" spellcheck="false" />
      </form>
      <div id="workspace">
        <div id="preview">
          <div id="preview-empty"></div>
          <iframe id="portal" title="preview" hidden></iframe>
        </div>
        <pre id="console"></pre>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
